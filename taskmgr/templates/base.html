{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}TaskFlow{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">TaskFlow</a>
    <div class="ms-auto">
      {% if user.is_authenticated %}
        <span class="text-white me-3">Hi, {{ user.username }}</span>
        <a class="btn btn-sm btn-light" href="{% url 'logout' %}">Logout</a>
      {% else %}
        <a class="btn btn-sm btn-light me-2" href="{% url 'login' %}">Login</a>
        <a class="btn btn-sm btn-outline-light" href="{% url 'register' %}">Register</a>
      {% endif %}
    </div>
  </div>
</nav>
<main class="container">{% block content %}{% endblock %}</main>
{% block extra_js %}{% endblock %}
</body></html>
