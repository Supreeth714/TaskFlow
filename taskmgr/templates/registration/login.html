{% extends 'base.html' %}{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
  <div class="card shadow-sm"><div class="card-body">
    <h1 class="h4 mb-3">Login</h1>
    <form method="post">{% csrf_token %}
      {% for f in form %}<div class="mb-3"><label class="form-label">{{ f.label }}</label>{{ f }}{% if f.errors %}<div class="text-danger small">{{ f.errors }}</div>{% endif %}</div>{% endfor %}
      <button class="btn btn-primary w-100">Sign in</button>
    </form>
    <p class="mt-3 small">No account? <a href="{% url 'register' %}">Register</a></p>
  </div></div>
</div></div>
<style>input{width:100%;padding:.375rem .75rem;border:1px solid #ced4da;border-radius:.375rem}</style>
{% endblock %}
