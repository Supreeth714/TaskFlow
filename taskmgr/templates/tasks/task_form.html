{% extends 'base.html' %}{% block content %}
<h1 class="h3 mb-3">{{ title }}</h1>
<form method="post" class="card card-body shadow-sm">{% csrf_token %}
  {% for f in form %}
    <div class="mb-3"><label class="form-label">{{ f.label }}</label>{{ f }}{% if f.errors %}<div class="text-danger small">{{ f.errors }}</div>{% endif %}</div>
  {% endfor %}
  <div class="d-flex gap-2"><button class="btn btn-primary">Save</button><a href="{% url 'task_list' %}" class="btn btn-link">Cancel</a></div>
</form>
{% endblock %}
